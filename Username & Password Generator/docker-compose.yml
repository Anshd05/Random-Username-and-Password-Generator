version: '3.8'

services:
  cryptogen:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=100m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - cryptogen-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - cryptogen
    restart: unless-stopped
    networks:
      - cryptogen-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  cryptogen-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
